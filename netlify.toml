# Netlify Configuration for Static Site

[build]
  publish = "public"
  command = "echo 'Static site - no build needed'"

# Redirect www -> apex (canonical)
[[redirects]]
  from = "https://www.megaverselive.com/*"
  to = "https://megaverselive.com/:splat"
  status = 301
  force = true

# Serve a proper 404 page for unknown paths (existing files are served first)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[context.production]
  environment = { SITE = "production" }

[context.deploy-preview]
  environment = { SITE = "preview" }
