# Netlify Configuration for Static Site

[build]
  publish = "public"
  command = "echo 'Static site - no build needed'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { SITE = "production" }

[context.deploy-preview]
  environment = { SITE = "preview" }
