[build]
  command = "echo 'Static site - no build needed'"
  publish = "public"

[[redirects]]
  from = "/api/*"
  to = "https://megaverse-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/auth.html"
  status = 200

[context.production]
  environment = { API_URL = "https://megaverse-api.onrender.com" }

[context.deploy-preview]
  environment = { API_URL = "https://megaverse-api.onrender.com" }
