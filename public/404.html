<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Megaverse Live</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { --brand: #9333ea; --brand-dark: #581c87; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #581c87 0%, #9333ea 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 560px; }
    .code { font-size: clamp(72px, 18vw, 140px); font-weight: 900; line-height: 1; letter-spacing: -2px; }
    h1 { margin-top: 12px; font-size: clamp(22px, 5vw, 32px); font-weight: 800; }
    p { margin-top: 14px; color: #e9d5ff; font-size: 16px; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      background: #10b981;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 999px;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16,185,129,.4); }
    .rocket { font-size: 56px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="rocket">🚀</div>
    <div class="code">404</div>
    <h1>This page drifted off into the megaverse</h1>
    <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <a class="btn" href="/">← Back to home</a>
  </div>
</body>
</html>
